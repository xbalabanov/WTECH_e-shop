<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Product Editor</title>
    <link rel="stylesheet" href="CSS/style.css" />
    <link rel="stylesheet" href="CSS/admin-product.css" />
  </head>

  <body class="admin-product-body">
    <header class="site-header" aria-label="Admin header">
      <div class="header-inner admin-header-inner">
        <div class="logo" aria-label="Eunoia logo">
          <div class="logo-icon" aria-hidden="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
            >
              <path
                d="M10 5.83325V17.4999"
                stroke="white"
                stroke-width="1.66667"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M2.50008 15C2.27907 15 2.06711 14.9122 1.91083 14.7559C1.75455 14.5996 1.66675 14.3877 1.66675 14.1667V3.33333C1.66675 3.11232 1.75455 2.90036 1.91083 2.74408C2.06711 2.5878 2.27907 2.5 2.50008 2.5H6.66675C7.5508 2.5 8.39865 2.85119 9.02377 3.47631C9.64889 4.10143 10.0001 4.94928 10.0001 5.83333C10.0001 4.94928 10.3513 4.10143 10.9764 3.47631C11.6015 2.85119 12.4494 2.5 13.3334 2.5H17.5001C17.7211 2.5 17.9331 2.5878 18.0893 2.74408C18.2456 2.90036 18.3334 3.11232 18.3334 3.33333V14.1667C18.3334 14.3877 18.2456 14.5996 18.0893 14.7559C17.9331 14.9122 17.7211 15 17.5001 15H12.5001C11.837 15 11.2012 15.2634 10.7323 15.7322C10.2635 16.2011 10.0001 16.837 10.0001 17.5C10.0001 16.837 9.73669 16.2011 9.26785 15.7322C8.79901 15.2634 8.16312 15 7.50008 15H2.50008Z"
                stroke="white"
                stroke-width="1.66667"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <div class="logo-text">Eunoia</div>
        </div>

        <div class="admin-actions" aria-label="Admin actions">
          <button type="button" class="header-icon-btn" aria-label="Profile">
            <svg
              width="18"
              height="20"
              viewBox="0 0 18 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M16.75 19C16.75 16.2386 13.2242 14 8.875 14C4.52576 14 1 16.2386 1 19M8.875 11C6.15672 11 3.95312 8.76142 3.95312 6C3.95312 3.23858 6.15672 1 8.875 1C11.5933 1 13.7969 3.23858 13.7969 6C13.7969 8.76142 11.5933 11 8.875 11Z"
                stroke="#0A0A0A"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <a class="header-icon-btn" href="login.html" aria-label="Log out">
            <svg
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M6.75 15.75H4.5C3.67157 15.75 3 15.0784 3 14.25V3.75C3 2.92157 3.67157 2.25 4.5 2.25H6.75"
                stroke="#0A0A0A"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M10.5 12.75L13.5 9.75L10.5 6.75"
                stroke="#0A0A0A"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M13.5 9.75H7.5"
                stroke="#0A0A0A"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
        </div>
      </div>
    </header>

    <main class="admin-product-main">
      <section class="editor-wrapper" aria-labelledby="editor-heading">
        <div class="editor-header">
          <div class="editor-icon" aria-hidden="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
            >
              <path
                d="M10 5.83325V17.4999"
                stroke="#305252"
                stroke-width="1.66667"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M2.50008 15C2.27907 15 2.06711 14.9122 1.91083 14.7559C1.75455 14.5996 1.66675 14.3877 1.66675 14.1667V3.33333C1.66675 3.11232 1.75455 2.90036 1.91083 2.74408C2.06711 2.5878 2.27907 2.5 2.50008 2.5H6.66675C7.5508 2.5 8.39865 2.85119 9.02377 3.47631C9.64889 4.10143 10.0001 4.94928 10.0001 5.83333C10.0001 4.94928 10.3513 4.10143 10.9764 3.47631C11.6015 2.85119 12.4494 2.5 13.3334 2.5H17.5001C17.7211 2.5 17.9331 2.5878 18.0893 2.74408C18.2456 2.90036 18.3334 3.11232 18.3334 3.33333V14.1667C18.3334 14.3877 18.2456 14.5996 18.0893 14.7559C17.9331 14.9122 17.7211 15 17.5001 15H12.5001C11.837 15 11.2012 15.2634 10.7323 15.7322C10.2635 16.2011 10.0001 16.837 10.0001 17.5C10.0001 16.837 9.73669 16.2011 9.26785 15.7322C8.79901 15.2634 8.16312 15 7.50008 15H2.50008Z"
                stroke="#305252"
                stroke-width="1.66667"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <h1 id="editor-heading">Book Editing</h1>
          <a class="back-to-inventory-btn" href="admin.html"
            >Back to inventory</a
          >
        </div>

        <form class="editor-grid" aria-label="Book editor form">
          <div class="media-section">
            <h2 class="section-label">Book Pictures:</h2>

            <input
              id="cover-image-input"
              class="file-input"
              type="file"
              accept="image/*"
            />
            <input
              id="gallery-images-input"
              class="file-input"
              type="file"
              accept="image/*"
              multiple
            />

            <div class="cover-upload">
              <div class="cover-info">
                <p class="upload-title">Cover image</p>
                <p class="upload-copy">JPG, PNG or WEBP up to 3MB</p>
                <label class="pick-file-btn" for="cover-image-input"
                  >Choose cover</label
                >
                <p class="selected-files" id="cover-file-name">
                  No cover selected
                </p>
              </div>
              <div class="cover-preview" id="cover-preview" hidden>
                <img
                  id="cover-preview-image"
                  alt="Selected book cover preview"
                />
              </div>
            </div>

            <div class="gallery-upload">
              <p class="upload-title">Other images</p>
              <p class="upload-copy">
                Drag pictures here or choose on your computer
              </p>
              <label class="pick-file-btn" for="gallery-images-input"
                >Choose images</label
              >
              <p class="selected-files" id="gallery-file-count">
                0 images selected
              </p>

              <div
                class="gallery-preview"
                id="gallery-preview"
                aria-label="Other image previews"
              ></div>
            </div>
          </div>

          <div class="details-section">
            <div class="field-grid">
              <label>
                <span>Book name:</span>
                <input type="text" placeholder="Enter book name" />
              </label>

              <label class="full author-field">
                <span>Authors:</span>
                <div
                  class="authors-list"
                  id="authors-list"
                  aria-label="Authors list"
                >
                  <div class="author-row">
                    <input
                      type="text"
                      name="authors[]"
                      placeholder="Enter author name"
                    />
                    <button
                      type="button"
                      class="author-remove-btn"
                      aria-label="Remove author"
                      hidden
                    >
                      Remove
                    </button>
                  </div>
                </div>
                <button
                  type="button"
                  class="author-add-btn"
                  id="author-add-btn"
                >
                  + Add author
                </button>
              </label>

              <label class="full">
                <span>Description:</span>
                <textarea
                  rows="4"
                  placeholder="Write short description"
                ></textarea>
              </label>

              <label>
                <span>Genre:</span>
                <select>
                  <option selected>Select genre</option>
                  <option>Fantasy</option>
                  <option>Thriller</option>
                  <option>Sci-Fi</option>
                </select>
              </label>

              <label>
                <span>ISBN:</span>
                <input type="text" placeholder="978-..." />
              </label>

              <label>
                <span>Price:</span>
                <input type="number" step="0.01" placeholder="0.00" />
              </label>

              <label>
                <span>Discount (%):</span>
                <input type="number" step="1" min="0" placeholder="0" />
              </label>

              <label>
                <span>Publication date:</span>
                <input type="date" />
              </label>

              <label>
                <span>Language:</span>
                <input type="text" placeholder="English" />
              </label>

              <label>
                <span>Pages:</span>
                <input type="number" step="1" min="1" placeholder="300" />
              </label>

              <label>
                <span>Publisher:</span>
                <input type="text" placeholder="Publisher name" />
              </label>

              <label>
                <span>Stock:</span>
                <input type="number" step="1" min="0" placeholder="0" />
              </label>
            </div>
          </div>

          <div class="editor-actions">
            <button type="button" class="save-book-btn" id="save-book-btn">
              Save the book
            </button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer admin-footer-minimal" aria-label="Footer">
      <div class="footer-inner">
        <div class="footer-bottom">
          <div class="copyright">© 2026 Eunoia. All rights reserved.</div>
          <div class="made-with">Made with care for book lovers everywhere</div>
        </div>
      </div>
    </footer>
    <script src="JS/admin-product.js"></script>
  </body>
</html>
